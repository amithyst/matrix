name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Runtime lock schema
        run: python3 scripts/verify_matrix_sonic_runtime.py --schema-only
      - name: Shell syntax
        run: bash -n scripts/*.sh scripts/release_manager/*.sh
      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
